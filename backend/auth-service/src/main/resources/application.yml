server:
  port: ${AUTH_PORT:8081}

spring:
  application:
    name: auth-service

  # ── Database (Supabase PostgreSQL) ────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthHikariPool
      maximum-pool-size: 5          # Low for free tier (Supabase limits connections)
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  # ── JPA ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway manages schema, JPA just validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth_schema
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── Flyway — DB Migrations ────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth_schema
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ── Google OAuth2 ─────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            issuer-uri: https://accounts.google.com

  # ── Mail (for OTP/reset — Phase 2 extension) ──────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ── Eureka ────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:corecompass2026}@${EUREKA_HOST:localhost}:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      version: "1.0.0"

# ── JWT ───────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:CoreCompassSuperSecretKeyForJWTTokenGenerationMinimum256BitsLong}
  access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY:900}         # 15 min
  refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY:604800}    # 7 days

# ── App Config ────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    com.corecompass.auth: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
