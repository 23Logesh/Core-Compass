server:
  port: ${FITNESS_PORT:8083}
spring:
  application:
    name: fitness-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FitnessHikariPool
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: fitness_schema
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: fitness_schema
    baseline-on-migrate: true
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:corecompass2026}@${EUREKA_HOST:localhost}:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    com.corecompass.fitness: DEBUG
    root: INFO
